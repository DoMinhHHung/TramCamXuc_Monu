server:
  port: 8761
spring:
  application:
    name: discovery-server

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      show-details: never
  metrics:
    tags:
      application: ${spring.application.name}
eureka:
  client:
    register-with-eureka: false
    fetch-registry: false