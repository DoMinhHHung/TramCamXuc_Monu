server:
  port: 8761
spring:
  application:
    name: discovery-server

  zipkin:
    base-url: ${ZIPKIN_URL:http://zipkin:9411}
    sleuth:
      sampler:
        probability: 1.0

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

eureka:
  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:discovery-server}
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://${EUREKA_INSTANCE_HOSTNAME:discovery-server}:8761/eureka/}
  server:
    enable-self-preservation: false
    wait-time-in-ms-when-sync-empty: 0
