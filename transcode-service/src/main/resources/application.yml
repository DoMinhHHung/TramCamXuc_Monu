server:
  port: 8766

spring:
  application:
    name: transcoder-service

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

minio:
  url: ${MINIO_ENDPOINT}
  public-url: ${MINIO_PUBLIC_URL}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET}
  bucket:
    raw-songs: ${MINIO_RAW_BUCKET:music}
    public-songs: ${MINIO_PUBLIC_BUCKET:public-songs}

management:
  endpoints:
    web:
      exposure:
        include: health,info
