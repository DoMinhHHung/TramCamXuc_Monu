server:
  port: 8769
  compression:
    enabled: true
    mime-types:
      - application/json
      - application/javascript
      - text/plain
    min-response-size: 1024

spring:
  application:
    name: recommendation-service

  cloud:
    openfeign:
      client:
        config:
          social-service:
            connectTimeout: 8000
            readTimeout: 90000

  main:
    lazy-initialization: false
    banner-mode: off
  jmx:
    enabled: false
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.admin.SpringApplicationAdminJmxAutoConfiguration
      - org.springframework.boot.autoconfigure.jmx.JmxAutoConfiguration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: true

  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    virtual-host: ${RABBITMQ_VHOST:/}
    cache:
      connection:
        mode: channel
      channel:
        size: 5

eureka:
  client:
    registry-fetch-interval-seconds: 5
    eureka-server-connect-timeout-seconds: 3
    eureka-server-read-timeout-seconds: 5
    eureka-connection-idle-timeout-seconds: 30
    initial-instance-info-replication-interval-seconds: 5
    instance-info-replication-interval-seconds: 10
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 20

# URL của Python ML service
ml:
  service:
    url: ${ML_SERVICE_URL:http://localhost:8771}
social:
  service:
    url: ${SOCIAL_SERVICE_URL:http://social-service:8767}

recommendation:
  blend:
    cf-weight: 0.35
    cb-weight: 0.25
    social-weight: 0.20
    trending-weight: 0.15
    freshness-weight: 0.05
  trending:
    decay-factor: 0.85          
    global-top-size: 200         
    genre-top-size: 100
  cache:
    home-ttl-minutes: 15
    trending-ttl-minutes: 5
    social-ttl-minutes: 10
    similar-ttl-minutes: 30
    insights-ttl-minutes: 30
  page:
    default-size: 20
    max-songs-per-artist: 2      
    exclusion-window-days: 7     
  health:
    ml-probe-connect-timeout-ms: 5000
    ml-probe-read-timeout-ms: 90000
    ml-check-interval-ms: 30000
    ml-check-initial-delay-ms: 0

open:
  api:
    server-url: ${GATEWAY_URL:http://localhost:8080}/service-recommendation
    server-description: API Gateway

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
      status:
        # DEGRADED (ML down, vẫn phục vụ fallback) không bị coi như DOWN mặc định
        order: DOWN, OUT_OF_SERVICE, UNKNOWN, DEGRADED, UP
  metrics:
    tags:
      application: ${spring.application.name}

internal:
  service-secret: ${INTERNAL_SERVICE_SECRET:}
gateway:
  internal-secret: ${GATEWAY_INTERNAL_SECRET:}