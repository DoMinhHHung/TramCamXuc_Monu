server:
  port: 8087

spring:
  application:
    name: recommendation-service

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

jwt:
  signerKey: ${JWT_SECRET}

ml:
  service:
    url: ${ML_SERVICE_URL:http://localhost:8000}
    timeout-ms: 3000   # fallback sang rule-based nếu ML chậm hơn 3s

recommendation:
  cache:
    for-you-ttl-minutes: 30
    similar-ttl-minutes: 60
    trending-ttl-minutes: 5
    new-releases-ttl-minutes: 15
  # Ngưỡng cold start: user có ít hơn N lượt nghe → dùng rule-based
  cold-start-threshold: 5
  # Số bài trả về mặc định
  default-limit: 20

open:
  api:
    server-url: ${GATEWAY_URL:http://localhost:8080}/service-recommendation
    server-description: API Gateway