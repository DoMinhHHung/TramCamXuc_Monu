server:
  port: 8769

spring:
  application:
    name: recommendation-service

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

jwt:
  signerKey: ${JWT_SECRET}

# URL của Python ML service
ml:
  service:
    url: ${ML_SERVICE_URL:http://localhost:8771}
social:
  service:
    url: ${SOCIAL_SERVICE_URL:http://social-service:8767}

# Cấu hình blending weights — tách ra yml để dễ tune không cần redeploy
recommendation:
  blend:
    cf-weight: 0.35
    cb-weight: 0.25
    social-weight: 0.20
    trending-weight: 0.15
    freshness-weight: 0.05
  trending:
    decay-factor: 0.85           # nhân mỗi giờ → bài 8h trước còn ~27% score
    global-top-size: 200         # giữ 200 bài trong ZSET global (đủ để phân trang)
    genre-top-size: 100
  cache:
    home-ttl-minutes: 15
    trending-ttl-minutes: 5
    social-ttl-minutes: 10
    similar-ttl-minutes: 30
    insights-ttl-minutes: 30
  page:
    default-size: 20
    max-songs-per-artist: 2      # không trả quá 2 bài cùng artist trong top-20
    exclusion-window-days: 7     # loại bài user nghe trong 7 ngày qua

open:
  api:
    server-url: ${GATEWAY_URL:http://localhost:8080}/service-recommendation
    server-description: API Gateway

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html