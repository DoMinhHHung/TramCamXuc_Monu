server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: identity-service
          uri: lb://IDENTITY-SERVICE
          predicates:
            - Path=/api/v1/auth/**, /api/v1/users/**

        - id: identity-swagger
          uri: lb://IDENTITY-SERVICE
          predicates:
            - Path=/service-identity/**
          filters:
            - StripPrefix=1

        - id: payment-service
          uri: lb://PAYMENT-SERVICE
          predicates:
            - Path=/service-payment/**
          filters:
            - StripPrefix=1

        - id: music-service
          uri: lb://MUSIC-SERVICE
          predicates:
            - Path=/service-music/**
            - Path=/api/v1/songs/**, /api/v1/albums/**, /api/v1/genres/**, /api/v1/artists/**
          filters:
            - StripPrefix=1

        - id: social-service
          uri: lb://SOCIAL-SERVICE
          predicates:
            - Path=/api/v1/social/**
          filters:
            - StripPrefix=2

        - id: social-swagger
          uri: lb://SOCIAL-SERVICE
          predicates:
            - Path=/service-social/**
          filters:
            - StripPrefix=1

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/