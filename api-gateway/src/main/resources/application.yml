server:
  port: 8080

spring:
  application:
    name: api-gateway
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: true


  main:
    lazy-initialization: false
    banner-mode: off
#  jmx:
#    enabled: false
#  autoconfigure:
#    exclude:
#      - org.springframework.boot.autoconfigure.admin.SpringApplicationAdminJmxAutoConfiguration
#      - org.springframework.boot.autoconfigure.jmx.JmxAutoConfiguration

  cloud:
    gateway:
      httpclient:
        connect-timeout: 5000
        response-timeout: 30s
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      filter:
        request-rate-limiter:
          deny-empty-key: false
          empty-key-status-code: 200

      routes:

        # ================= IDENTITY =================

        - id: identity-auth-login
          uri: lb://IDENTITY-SERVICE
          predicates:
            - Path=/auth/login
            - Method=POST
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipAndUserKeyResolver}"
                redis-rate-limiter.replenishRate: 1
                redis-rate-limiter.burstCapacity: 3
                redis-rate-limiter.requestedTokens: 1

        - id: identity-auth-registration
          uri: lb://IDENTITY-SERVICE
          predicates:
            - Path=/auth/registration
            - Method=POST
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipAndUserKeyResolver}"
                redis-rate-limiter.replenishRate: 1
                redis-rate-limiter.burstCapacity: 2
                redis-rate-limiter.requestedTokens: 1

        - id: identity-auth-otp-sensitive
          uri: lb://IDENTITY-SERVICE
          predicates:
            - Path=/auth/verify, /auth/resend-otp, /auth/forgot-password, /auth/reset-password
            - Method=POST
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipAndUserKeyResolver}"
                redis-rate-limiter.replenishRate: 1
                redis-rate-limiter.burstCapacity: 2
                redis-rate-limiter.requestedTokens: 1

        - id: identity-auth-refresh
          uri: lb://IDENTITY-SERVICE
          predicates:
            - Path=/auth/refresh
            - Method=POST
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipAndUserKeyResolver}"
                redis-rate-limiter.replenishRate: 2
                redis-rate-limiter.burstCapacity: 6
                redis-rate-limiter.requestedTokens: 1

        - id: identity-auth-social
          uri: lb://IDENTITY-SERVICE
          predicates:
            - Path=/auth/social, /auth/oauth/complete
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipAndUserKeyResolver}"
                redis-rate-limiter.replenishRate: 2
                redis-rate-limiter.burstCapacity: 5
                redis-rate-limiter.requestedTokens: 1

        - id: identity-service-auth
          uri: lb://IDENTITY-SERVICE
          predicates:
            - Path=/auth/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipAndUserKeyResolver}"
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                redis-rate-limiter.requestedTokens: 1

        - id: identity-service-users
          uri: lb://IDENTITY-SERVICE
          predicates:
            - Path=/users/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipAndUserKeyResolver}"
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requestedTokens: 1

        - id: identity-swagger
          uri: lb://IDENTITY-SERVICE
          predicates:
            - Path=/service-identity/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipAndUserKeyResolver}"
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                redis-rate-limiter.requestedTokens: 1

        # ================= MUSIC =================

        - id: music-upload-sensitive
          uri: lb://MUSIC-SERVICE
          predicates:
            - Path=/songs/request-upload, /songs/*/confirm
            - Method=POST
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipAndUserKeyResolver}"
                redis-rate-limiter.replenishRate: 1
                redis-rate-limiter.burstCapacity: 4
                redis-rate-limiter.requestedTokens: 1

        - id: music-stream-download-sensitive
          uri: lb://MUSIC-SERVICE
          predicates:
            - Path=/songs/*/download
            - Method=GET
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipAndUserKeyResolver}"
                redis-rate-limiter.replenishRate: 1
                redis-rate-limiter.burstCapacity: 5
                redis-rate-limiter.requestedTokens: 1

        - id: music-analytics-write
          uri: lb://MUSIC-SERVICE
          predicates:
            - Path=/songs/*/play, /songs/*/listen
            - Method=POST
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipAndUserKeyResolver}"
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requestedTokens: 1

        - id: music-admin-jamendo-import
          uri: lb://MUSIC-SERVICE
          predicates:
            - Path=/admin/jamendo/import
            - Method=POST
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipAndUserKeyResolver}"
                redis-rate-limiter.replenishRate: 1
                redis-rate-limiter.burstCapacity: 1
                redis-rate-limiter.requestedTokens: 1

        - id: music-service-api
          uri: lb://MUSIC-SERVICE
          predicates:
            - Path=/songs/**, /albums/**, /genres/**, /artists/**, /playlists/**, /admin/songs/**, /admin/jamendo/**, /admin/reports/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipAndUserKeyResolver}"
                redis-rate-limiter.replenishRate: 30
                redis-rate-limiter.burstCapacity: 60
                redis-rate-limiter.requestedTokens: 1

        - id: music-swagger
          uri: lb://MUSIC-SERVICE
          predicates:
            - Path=/service-music/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipAndUserKeyResolver}"
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                redis-rate-limiter.requestedTokens: 1

        # ================= PAYMENT =================

        - id: payment-webhook
          uri: lb://PAYMENT-SERVICE
          predicates:
            - Path=/payments/payos_transfer_handler
            - Method=POST
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipAndUserKeyResolver}"
                redis-rate-limiter.replenishRate: 2
                redis-rate-limiter.burstCapacity: 10
                redis-rate-limiter.requestedTokens: 1

        - id: payment-subscription-purchase
          uri: lb://PAYMENT-SERVICE
          predicates:
            - Path=/subscriptions/purchase
            - Method=POST
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipAndUserKeyResolver}"
                redis-rate-limiter.replenishRate: 1
                redis-rate-limiter.burstCapacity: 3
                redis-rate-limiter.requestedTokens: 1

        - id: payment-cancel-payment-link
          uri: lb://PAYMENT-SERVICE
          predicates:
            - Path=/payments/*/cancel
            - Method=PUT
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipAndUserKeyResolver}"
                redis-rate-limiter.replenishRate: 1
                redis-rate-limiter.burstCapacity: 3
                redis-rate-limiter.requestedTokens: 1

        - id: payment-service-payments
          uri: lb://PAYMENT-SERVICE
          predicates:
            - Path=/payments/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipAndUserKeyResolver}"
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requestedTokens: 1

        - id: ads-clicked-sensitive
          uri: lb://ADS-SERVICE
          predicates:
            - Path=/ads/*/clicked
            - Method=POST
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipAndUserKeyResolver}"
                redis-rate-limiter.replenishRate: 1
                redis-rate-limiter.burstCapacity: 3
                redis-rate-limiter.requestedTokens: 1

        - id: ads-service-api
          uri: lb://ADS-SERVICE
          predicates:
            - Path=/ads/**, /admin/ads/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipAndUserKeyResolver}"
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                redis-rate-limiter.requestedTokens: 1

        - id: payment-service-subscriptions
          uri: lb://PAYMENT-SERVICE
          predicates:
            - Path=/subscriptions/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipAndUserKeyResolver}"
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requestedTokens: 1

        - id: payment-service-admin
          uri: lb://PAYMENT-SERVICE
          predicates:
            - Path=/admin/subscriptions/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipAndUserKeyResolver}"
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                redis-rate-limiter.requestedTokens: 1

        - id: payment-swagger
          uri: lb://PAYMENT-SERVICE
          predicates:
            - Path=/service-payment/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipAndUserKeyResolver}"
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                redis-rate-limiter.requestedTokens: 1

        # ================= SOCIAL =================

        - id: social-feed-write
          uri: lb://SOCIAL-SERVICE
          predicates:
            - Path=/social/feed, /social/feed/*
            - Method=POST,PATCH,DELETE
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipAndUserKeyResolver}"
                redis-rate-limiter.replenishRate: 2
                redis-rate-limiter.burstCapacity: 10
                redis-rate-limiter.requestedTokens: 1

        - id: social-comment-write
          uri: lb://SOCIAL-SERVICE
          predicates:
            - Path=/social/comments, /social/comments/*, /social/comments/*/like, /social/comments/post
            - Method=POST,PATCH,DELETE
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipAndUserKeyResolver}"
                redis-rate-limiter.replenishRate: 3
                redis-rate-limiter.burstCapacity: 15
                redis-rate-limiter.requestedTokens: 1

        - id: social-feed-like-write
          uri: lb://SOCIAL-SERVICE
          predicates:
            - Path=/social/feed/*/like
            - Method=POST,DELETE
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipAndUserKeyResolver}"
                redis-rate-limiter.replenishRate: 4
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requestedTokens: 1

        - id: social-follow-write
          uri: lb://SOCIAL-SERVICE
          predicates:
            - Path=/social/follows, /social/follows/*
            - Method=POST,DELETE
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipAndUserKeyResolver}"
                redis-rate-limiter.replenishRate: 3
                redis-rate-limiter.burstCapacity: 12
                redis-rate-limiter.requestedTokens: 1

        - id: social-heart-reaction-write
          uri: lb://SOCIAL-SERVICE
          predicates:
            - Path=/social/hearts, /social/hearts/*, /social/reactions/like, /social/reactions/dislike, /social/reactions/*
            - Method=POST,DELETE
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipAndUserKeyResolver}"
                redis-rate-limiter.replenishRate: 4
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requestedTokens: 1

        - id: social-share-to-feed-write
          uri: lb://SOCIAL-SERVICE
          predicates:
            - Path=/social/share/feed
            - Method=POST
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipAndUserKeyResolver}"
                redis-rate-limiter.replenishRate: 2
                redis-rate-limiter.burstCapacity: 10
                redis-rate-limiter.requestedTokens: 1

        - id: social-service-api
          uri: lb://SOCIAL-SERVICE
          predicates:
            - Path=/social/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipAndUserKeyResolver}"
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                redis-rate-limiter.requestedTokens: 1

        - id: social-swagger
          uri: lb://SOCIAL-SERVICE
          predicates:
            - Path=/service-social/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipAndUserKeyResolver}"
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                redis-rate-limiter.requestedTokens: 1

        # ================= RECOMMENDATION =================

        - id: recommendation-heavy-home
          uri: lb://RECOMMENDATION-SERVICE
          predicates:
            - Path=/recommendations/home, /recommendations/social, /recommendations/similar/*
            - Method=GET
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipAndUserKeyResolver}"
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 15
                redis-rate-limiter.requestedTokens: 1

        - id: recommendation-feedback-write
          uri: lb://RECOMMENDATION-SERVICE
          predicates:
            - Path=/recommendations/feedback
            - Method=POST
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipAndUserKeyResolver}"
                redis-rate-limiter.replenishRate: 4
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requestedTokens: 1

        - id: recommendation-insights
          uri: lb://RECOMMENDATION-SERVICE
          predicates:
            - Path=/recommendations/insights
            - Method=GET
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipAndUserKeyResolver}"
                redis-rate-limiter.replenishRate: 2
                redis-rate-limiter.burstCapacity: 5
                redis-rate-limiter.requestedTokens: 1

        - id: recommendation-service-api
          uri: lb://RECOMMENDATION-SERVICE
          predicates:
            - Path=/recommendations/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipAndUserKeyResolver}"
                redis-rate-limiter.replenishRate: 30
                redis-rate-limiter.burstCapacity: 60
                redis-rate-limiter.requestedTokens: 1

        - id: recommendation-swagger
          uri: lb://RECOMMENDATION-SERVICE
          predicates:
            - Path=/service-recommendation/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipAndUserKeyResolver}"
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                redis-rate-limiter.requestedTokens: 1

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

jwt:
  signerKey: ${JWT_SECRET:}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: identity-service
        url: /service-identity/v3/api-docs
      - name: music-service
        url: /service-music/v3/api-docs
      - name: payment-service
        url: /service-payment/v3/api-docs
      - name: social-service
        url: /service-social/v3/api-docs
      - name: recommendation-service
        url: /service-recommendation/v3/api-docs
  api-docs:
    enabled: true

management:
  tracing:
    sampling:
      probability: 1.0

gateway:
  internal-secret: ${GATEWAY_INTERNAL_SECRET:}