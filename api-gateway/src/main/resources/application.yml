server:
  port: 8080

spring:
  application:
    name: api-gateway
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: identity-service-auth
          uri: lb://IDENTITY-SERVICE
          predicates:
            - Path=/auth/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipAndUserKeyResolver}"
                redis-rate-limiter.replenishRate: 1
                redis-rate-limiter.burstCapacity: 5
                redis-rate-limiter.requestedTokens: 12 # ~5 requests/minute

        - id: identity-service-users
          uri: lb://IDENTITY-SERVICE
          predicates:
            - Path=/users/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipAndUserKeyResolver}"
                redis-rate-limiter.replenishRate: 2
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requestedTokens: 4 # ~30 requests/minute

        - id: identity-service-internal
          uri: lb://IDENTITY-SERVICE
          predicates:
            - Path=/internal/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipAndUserKeyResolver}"
                redis-rate-limiter.replenishRate: 2
                redis-rate-limiter.burstCapacity: 10
                redis-rate-limiter.requestedTokens: 6 # ~20 requests/minute

        - id: identity-swagger
          uri: lb://IDENTITY-SERVICE
          predicates:
            - Path=/service-identity/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipAndUserKeyResolver}"
                redis-rate-limiter.replenishRate: 1
                redis-rate-limiter.burstCapacity: 10
                redis-rate-limiter.requestedTokens: 2 # ~30 requests/minute

        - id: music-service-api
          uri: lb://MUSIC-SERVICE
          predicates:
            - Path=/api/v1/songs/**, /api/v1/albums/**, /api/v1/genres/**, /api/v1/artists/**, /api/v1/playlists/**, /api/v1/admin/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipAndUserKeyResolver}"
                redis-rate-limiter.replenishRate: 4
                redis-rate-limiter.burstCapacity: 40
                redis-rate-limiter.requestedTokens: 4 # ~60 requests/minute

        - id: music-swagger
          uri: lb://MUSIC-SERVICE
          predicates:
            - Path=/service-music/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipAndUserKeyResolver}"
                redis-rate-limiter.replenishRate: 1
                redis-rate-limiter.burstCapacity: 10
                redis-rate-limiter.requestedTokens: 2

        - id: payment-service-payments
          uri: lb://PAYMENT-SERVICE
          predicates:
            - Path=/payments/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipAndUserKeyResolver}"
                redis-rate-limiter.replenishRate: 2
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requestedTokens: 4

        - id: payment-service-subscriptions
          uri: lb://PAYMENT-SERVICE
          predicates:
            - Path=/subscriptions/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipAndUserKeyResolver}"
                redis-rate-limiter.replenishRate: 2
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requestedTokens: 4

        - id: payment-service-admin
          uri: lb://PAYMENT-SERVICE
          predicates:
            - Path=/admin/subscriptions/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipAndUserKeyResolver}"
                redis-rate-limiter.replenishRate: 1
                redis-rate-limiter.burstCapacity: 10
                redis-rate-limiter.requestedTokens: 4

        - id: payment-service-internal
          uri: lb://PAYMENT-SERVICE
          predicates:
            - Path=/api/internal/subscriptions/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipAndUserKeyResolver}"
                redis-rate-limiter.replenishRate: 1
                redis-rate-limiter.burstCapacity: 8
                redis-rate-limiter.requestedTokens: 6

        - id: payment-swagger
          uri: lb://PAYMENT-SERVICE
          predicates:
            - Path=/service-payment/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipAndUserKeyResolver}"
                redis-rate-limiter.replenishRate: 1
                redis-rate-limiter.burstCapacity: 10
                redis-rate-limiter.requestedTokens: 2

        - id: social-service-api
          uri: lb://SOCIAL-SERVICE
          predicates:
            - Path=/social/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipAndUserKeyResolver}"
                redis-rate-limiter.replenishRate: 3
                redis-rate-limiter.burstCapacity: 30
                redis-rate-limiter.requestedTokens: 3 # ~60 requests/minute

        - id: social-swagger
          uri: lb://SOCIAL-SERVICE
          predicates:
            - Path=/service-social/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipAndUserKeyResolver}"
                redis-rate-limiter.replenishRate: 1
                redis-rate-limiter.burstCapacity: 10
                redis-rate-limiter.requestedTokens: 2

        - id: recommendation-service-api
          uri: lb://RECOMMENDATION-SERVICE
          predicates:
            - Path=/api/v1/recommendations/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipAndUserKeyResolver}"
                redis-rate-limiter.replenishRate: 2
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requestedTokens: 2 # ~60 requests/minute

        - id: recommendation-swagger
          uri: lb://RECOMMENDATION-SERVICE
          predicates:
            - Path=/service-recommendation/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipAndUserKeyResolver}"
                redis-rate-limiter.replenishRate: 1
                redis-rate-limiter.burstCapacity: 10
                redis-rate-limiter.requestedTokens: 2

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

jwt:
  signerKey: ${JWT_SECRET:}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: identity-service
        url: /service-identity/v3/api-docs
      - name: music-service
        url: /service-music/v3/api-docs
      - name: payment-service
        url: /service-payment/v3/api-docs
      - name: social-service
        url: /service-social/v3/api-docs
      - name: recommendation-service
        url: /service-recommendation/v3/api-docs
  api-docs:
    enabled: true
