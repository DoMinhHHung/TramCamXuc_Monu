version: "3.9"

networks:
  tramcamxuc-net:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:

x-extra-hosts: &extra-hosts
  extra_hosts:
    - "host.docker.internal:host-gateway"

x-infra: &infra
  REDIS_HOST: host.docker.internal
  REDIS_PORT: ${REDIS_PORT:-6379}
  RABBITMQ_HOST: host.docker.internal
  RABBITMQ_PORT: 5672
  RABBITMQ_USERNAME: guest
  RABBITMQ_PASSWORD: guest
  ZIPKIN_URL: http://zipkin:9411

x-db: &db
  DB_USERNAME: ${DB_USERNAME}
  DB_PASSWORD: ${DB_PASSWORD}

x-minio: &minio
  MINIO_ENDPOINT: http://host.docker.internal:9000
  MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL}
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
  MINIO_SECRET: ${MINIO_SECRET}

services:

  zipkin:
    image: openzipkin/zipkin:3.3
    ports:
      - "9411:9411"
    networks:
      - tramcamxuc-net

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - tramcamxuc-net

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - tramcamxuc-net

  discovery-server:
    build:
      context: .
      dockerfile: discovery-server/Dockerfile
    ports:
      - "8761:8761"
    environment:
      ZIPKIN_URL: http://zipkin:9411
    depends_on:
      - zipkin
    <<: *extra-hosts
    networks:
      - tramcamxuc-net

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      <<: *infra
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - discovery-server
    <<: *extra-hosts
    networks:
      - tramcamxuc-net

  identity-service:
    build:
      context: .
      dockerfile: identity-service/Dockerfile
    ports:
      - "8762:8762"
    environment:
      <<: [*infra, *db]
      DB_URL_IDENTITY: jdbc:postgresql://host.docker.internal:5432/identity_db
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - discovery-server
    <<: *extra-hosts
    networks:
      - tramcamxuc-net

  music-service:
    build:
      context: .
      dockerfile: music-service/Dockerfile
    ports:
      - "8764:8764"
    environment:
      <<: [*infra, *db, *minio]
      DB_URL_MUSIC: jdbc:postgresql://host.docker.internal:5432/music_db
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - discovery-server
    <<: *extra-hosts
    networks:
      - tramcamxuc-net

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    ports:
      - "8765:8765"
    environment:
      <<: [*infra, *db]
      DB_URL_PAYMENT: jdbc:postgresql://host.docker.internal:5432/payment_db
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - discovery-server
    <<: *extra-hosts
    networks:
      - tramcamxuc-net

  recommendation-service:
    build:
      context: .
      dockerfile: recommendation-service/Dockerfile
    ports:
      - "8769:8769"
    environment:
      <<: *infra
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      ML_SERVICE_URL: http://recommendation-ml:8771
    depends_on:
      - discovery-server
      - recommendation-ml
    <<: *extra-hosts
    networks:
      - tramcamxuc-net

  recommendation-ml:
    build:
      context: ./recommendation-ml
    ports:
      - "8771:8771"
    <<: *extra-hosts
    networks:
      - tramcamxuc-net