version: "3.9"

name: tramcamxuc-monu

networks:
  tramcamxuc-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
  mongodb_data:
  prometheus_data:
  grafana_data:

x-app-env: &app-env
  TZ: UTC
  ZIPKIN_URL: ${ZIPKIN_URL:-http://zipkin:9411}
  EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:-http://discovery-server:8761/eureka/}
  JWT_SECRET: ${JWT_SECRET}
  REDIS_HOST: ${REDIS_HOST:-redis}
  REDIS_PORT: ${REDIS_PORT:-6379}
  RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
  RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
  RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
  RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
  MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
  MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9000}
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-admin}
  MINIO_SECRET: ${MINIO_SECRET:-password123}
  MINIO_RAW_BUCKET: ${MINIO_RAW_BUCKET:-music}
  MINIO_PUBLIC_BUCKET: ${MINIO_PUBLIC_BUCKET:-public-songs}
  MINIO_ADS_BUCKET: ${MINIO_ADS_BUCKET:-ads-audio}
  MINIO_AI_BUCKET: ${MINIO_AI_BUCKET:-ai-training-data}
  MONGODB_URI: ${MONGODB_URI:-mongodb://mongodb:27017/tramcamxuc_social}
  DB_USERNAME: ${DB_USERNAME:-postgres}
  DB_PASSWORD: ${DB_PASSWORD:-sapassword}

services:
  postgres:
    image: postgres:16-alpine
    container_name: tramcamxuc-postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sapassword}
      POSTGRES_DB: ${POSTGRES_DEFAULT_DB:-music-social}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${POSTGRES_DEFAULT_DB:-music-social}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - tramcamxuc-net

  mongodb:
    profiles: ["local-mongo"]
    image: mongo:7
    container_name: tramcamxuc-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s
    networks:
      - tramcamxuc-net

  redis:
    image: redis:7-alpine
    container_name: tramcamxuc-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - tramcamxuc-net

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: tramcamxuc-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s
    networks:
      - tramcamxuc-net

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    container_name: tramcamxuc-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET:-password123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - tramcamxuc-net

  minio-init:
    image: minio/mc:RELEASE.2025-02-21T16-00-46Z
    depends_on:
      minio:
        condition: service_started
    entrypoint: ["/bin/sh", "/scripts/init-minio.sh"]
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET:-password123}
      MINIO_RAW_BUCKET: ${MINIO_RAW_BUCKET:-music}
      MINIO_PUBLIC_BUCKET: ${MINIO_PUBLIC_BUCKET:-public-songs}
      MINIO_ADS_BUCKET: ${MINIO_ADS_BUCKET:-ads-audio}
      MINIO_AI_BUCKET: ${MINIO_AI_BUCKET:-ai-training-data}
      MINIO_ML_BUCKET: ${MINIO_ML_BUCKET:-ml-models}
    volumes:
      - ./docker/minio/init-minio.sh:/scripts/init-minio.sh:ro
    restart: "no"
    networks:
      - tramcamxuc-net

  zipkin:
    image: openzipkin/zipkin:3.5.1
    container_name: tramcamxuc-zipkin
    ports:
      - "9411:9411"
    networks:
      - tramcamxuc-net

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: tramcamxuc-prometheus
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - discovery-server
      - api-gateway
    networks:
      - tramcamxuc-net

  grafana:
    image: grafana/grafana:11.2.0
    container_name: tramcamxuc-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - tramcamxuc-net

  discovery-server:
    build:
      context: .
      dockerfile: discovery-server/Dockerfile
    container_name: tramcamxuc-discovery-server
    ports:
      - "8761:8761"
    environment:
      <<: *app-env
    depends_on:
      zipkin:
        condition: service_started
    networks:
      - tramcamxuc-net

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: tramcamxuc-api-gateway
    ports:
      - "8080:8080"
    environment:
      <<: *app-env
    depends_on:
      discovery-server:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - tramcamxuc-net

  identity-service:
    build:
      context: .
      dockerfile: identity-service/Dockerfile
    container_name: tramcamxuc-identity-service
    ports:
      - "8762:8762"
    environment:
      <<: *app-env
      DB_URL_IDENTITY: ${DB_URL_IDENTITY:-jdbc:postgresql://postgres:5432/identity_db}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@tramcamxuc.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-MatKhauSieuKho123!@}
      CLOUDINARY_NAME: ${CLOUDINARY_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_SECRET: ${CLOUDINARY_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      FACEBOOK_CLIENT_ID: ${FACEBOOK_CLIENT_ID:-}
      OAUTH_CALLBACK_BASE_URL: ${OAUTH_CALLBACK_BASE_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      discovery-server:
        condition: service_started
    networks:
      - tramcamxuc-net

  integration-service:
    build:
      context: .
      dockerfile: integration-service/Dockerfile
    container_name: tramcamxuc-integration-service
    ports:
      - "8763:8763"
    environment:
      <<: *app-env
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
    depends_on:
      rabbitmq:
        condition: service_healthy
      discovery-server:
        condition: service_started
      zipkin:
        condition: service_started
    networks:
      - tramcamxuc-net

  music-service:
    build:
      context: .
      dockerfile: music-service/Dockerfile
    container_name: tramcamxuc-music-service
    ports:
      - "8764:8764"
    environment:
      <<: *app-env
      DB_URL_MUSIC: ${DB_URL_MUSIC:-jdbc:postgresql://postgres:5432/music_db}
      JAMENDO_CLIENT_ID: ${JAMENDO_CLIENT_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      discovery-server:
        condition: service_started
    networks:
      - tramcamxuc-net

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    container_name: tramcamxuc-payment-service
    ports:
      - "8765:8765"
    environment:
      <<: *app-env
      DB_URL_PAYMENT: ${DB_URL_PAYMENT:-jdbc:postgresql://postgres:5432/payment_db}
      PAYOS_CLIENT_ID: ${PAYOS_CLIENT_ID:-}
      PAYOS_API_KEY: ${PAYOS_API_KEY:-}
      PAYOS_CHECK_SUM: ${PAYOS_CHECK_SUM:-}
      PAYOS_RETURN_URL: ${PAYOS_RETURN_URL:-tramcamxuc://payment/success}
      PAYOS_CANCEL_URL: ${PAYOS_CANCEL_URL:-tramcamxuc://payment/cancel}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      discovery-server:
        condition: service_started
    networks:
      - tramcamxuc-net

  transcode-service:
    build:
      context: .
      dockerfile: transcode-service/Dockerfile
    container_name: tramcamxuc-transcode-service
    ports:
      - "8766:8766"
    environment:
      <<: *app-env
    depends_on:
      rabbitmq:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      discovery-server:
        condition: service_started
    networks:
      - tramcamxuc-net

  social-service:
    build:
      context: .
      dockerfile: social-service/Dockerfile
    container_name: tramcamxuc-social-service
    ports:
      - "8767:8767"
    environment:
      <<: *app-env
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      discovery-server:
        condition: service_started
    networks:
      - tramcamxuc-net

  ads-service:
    build:
      context: .
      dockerfile: ads-service/Dockerfile
    container_name: tramcamxuc-ads-service
    ports:
      - "8768:8768"
    environment:
      <<: *app-env
      DB_URL_ADS: ${DB_URL_ADS:-jdbc:postgresql://postgres:5432/ads_db}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      discovery-server:
        condition: service_started
    networks:
      - tramcamxuc-net

  recommendation-ml:
    build:
      context: ./recommendation-ml
    container_name: tramcamxuc-recommendation-ml
    ports:
      - "8771:8771"
    environment:
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT_HOSTPORT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-admin}
      MINIO_SECRET_KEY: ${MINIO_SECRET:-password123}
      MINIO_SECURE: "false"
      MINIO_BUCKET: ${MINIO_ML_BUCKET:-ml-models}
      SOCIAL_SERVICE_URL: ${SOCIAL_SERVICE_URL:-http://social-service:8767}
      MUSIC_SERVICE_URL: ${MUSIC_SERVICE_URL:-http://music-service:8764}
    depends_on:
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - tramcamxuc-net

  recommendation-service:
    build:
      context: .
      dockerfile: recommendation-service/Dockerfile
    container_name: tramcamxuc-recommendation-service
    ports:
      - "8769:8769"
    environment:
      <<: *app-env
      ML_SERVICE_URL: ${ML_SERVICE_URL:-http://recommendation-ml:8771}
      SOCIAL_SERVICE_URL: ${SOCIAL_SERVICE_URL:-http://social-service:8767}
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      recommendation-ml:
        condition: service_started
      discovery-server:
        condition: service_started
    networks:
      - tramcamxuc-net
