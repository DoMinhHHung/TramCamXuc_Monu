server:
  port: 8768

spring:
  application:
    name: ads-service

  datasource:
    url: ${DB_URL_ADS}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  zipkin:
    base-url: ${ZIPKIN_URL:http://zipkin:9411}
    sleuth:
      sampler:
        # 1.0 = trace 100% request (chỉ dùng khi debug)
        # Production nên đặt 0.1 (10%) để không ngốm bandwidth
        probability: 1.0

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

jwt:
  signerKey: ${JWT_SECRET}

minio:
  url: ${MINIO_ENDPOINT}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET}
  bucket:
    ads: ${MINIO_ADS_BUCKET:ads-audio}

open:
  api:
    title: Ads Service API
    version: 1.0.0
    server-url: ${GATEWAY_URL:http://localhost:8080}/service-ads
    server-description: API Gateway

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    iuh.fit.se.adsservice: DEBUG

internal:
  gateway-secret: ${INTERNAL_GATEWAY_SECRET:changeme-in-production}
  service-secret: ${INTERNAL_SERVICE_SECRET:changeme-in-production}
