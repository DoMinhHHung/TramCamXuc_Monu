server:
  port: 8765

spring:
  application:
    name: payment-service

  main:
    lazy-initialization: true
    banner-mode: off
  jmx:
    enabled: false
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.admin.SpringApplicationAdminJmxAutoConfiguration
      - org.springframework.boot.autoconfigure.jmx.JmxAutoConfiguration

  datasource:
    url: ${DB_URL_PAYMENT}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 600000
      leak-detection-threshold: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    cache:
      connection:
        mode: channel
      channel:
        size: 5

eureka:
  client:
    registry-fetch-interval-seconds: 5
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 20

payos:
  client-id: ${PAYOS_CLIENT_ID}
  api-key: ${PAYOS_API_KEY}
  checksum-key: ${PAYOS_CHECK_SUM}
  return-url: ${PAYOS_RETURN_URL:https://phazelsound.oopsgolden.id.vn/payment/success}
  cancel-url: ${PAYOS_CANCEL_URL:https://phazelsound.oopsgolden.id.vn/payment/cancel}

app:
  frontend:
    url: ${FRONTEND_URL:https://phazelsound.oopsgolden.id.vn}

open:
  api:
    title: Payment Service API
    version: 1.0.0
    server-url: ${GATEWAY_URL:http://localhost:8080}/service-payment
    server-description: API Gateway

scheduling:
  subscription-check:
    fixed-rate: 60000

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      show-details: never
  metrics:
    tags:
      application: ${spring.application.name}

internal:
  service-secret: ${INTERNAL_SERVICE_SECRET}
gateway:
  internal-secret: ${GATEWAY_INTERNAL_SECRET:}