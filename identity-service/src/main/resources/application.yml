server:
  port: 8762
  compression:
    enabled: true
    mime-types:
      - application/json
      - application/javascript
      - text/plain
    min-response-size: 1024

spring:
  application:
    name: identity-service

  main:
    lazy-initialization: false
    banner-mode: off
  jmx:
    enabled: false
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.admin.SpringApplicationAdminJmxAutoConfiguration
      - org.springframework.boot.autoconfigure.jmx.JmxAutoConfiguration

  datasource:
    url: ${DB_URL_IDENTITY}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 300000
      max-lifetime: 600000
      leak-detection-threshold: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: true
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    virtual-host: ${RABBITMQ_VHOST:/}
    cache:
      connection:
        mode: channel
      channel:
        size: 5

eureka:
  client:
    registry-fetch-interval-seconds: 5
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 20

jwt:
  signerKey: ${JWT_SECRET}
  valid-duration: 3600000
  refreshable-duration: 1209600000

app:
  admin:
    email: ${ADMIN_EMAIL}
    password: ${ADMIN_PASSWORD}

cloudinary:
  cloud-name: ${CLOUDINARY_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_SECRET}

open:
  api:
    title: Identity Service API
    version: 1.0.0
    server-url: ${GATEWAY_URL:http://localhost:8080}/service-identity
    server-description: API Gateway

oauth:
  google:
    client-id: ${GOOGLE_CLIENT_ID}
  facebook:
    client-id: ${FACEBOOK_CLIENT_ID}
  callback-base-url: ${OAUTH_CALLBACK_BASE_URL:https://phazelsound.oopsgolden.id.vn}

internal:
  service-secret: ${INTERNAL_SERVICE_SECRET}
gateway:
  internal-secret: ${GATEWAY_INTERNAL_SECRET:}