version: '3.9'

networks:
  phazelsound-net:
    external: true

volumes:
  prometheus_data:
  grafana_data:
  zipkin_data:

services:

  # ─── Zipkin (distributed tracing) ──────────────────────────────
  zipkin:
    image: openzipkin/zipkin:3.3
    container_name: phazelsound-zipkin
    restart: unless-stopped
    ports:
      - "9411:9411"    # UI + API
    networks:
      - phazelsound-net
    environment:
      # Lưu trace vào memory (local dev)
      # Production: đổi sang STORAGE_TYPE=elasticsearch
      STORAGE_TYPE: mem
      # Giới hạn RAM cho Zipkin
      JAVA_OPTS: "-Xmx512m"

  # ─── Prometheus (metrics collector) ────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: phazelsound-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      # Lưu metrics 15 ngày
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    networks:
      - phazelsound-net

  # ─── Node Exporter (host metrics: CPU, RAM, Disk) ───────────────
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: phazelsound-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
    networks:
      - phazelsound-net

  # ─── cAdvisor (Docker container metrics) ────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: phazelsound-cadvisor
    restart: unless-stopped
    ports:
      - "8090:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - phazelsound-net
    privileged: true

  # ─── Grafana (visualization) ────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: phazelsound-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      # Auto-provision datasources (không cần config tay)
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Cho phép embed dashboard (nếu cần)
      GF_SECURITY_ALLOW_EMBEDDING: "true"
    networks:
      - phazelsound-net
    depends_on:
      - prometheus
      - zipkin