global:
  scrape_interval: 15s       # Scrape mỗi 15 giây
  evaluation_interval: 15s

scrape_configs:

  # ─── Prometheus tự monitor chính nó ────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ─── Node Exporter (host machine) ─────────────────────────────
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # ─── cAdvisor (Docker containers) ──────────────────────────────
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # ─── Spring Boot services ──────────────────────────────────────
  # Prometheus scrape endpoint: /actuator/prometheus

  - job_name: 'api-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['api-gateway:8080']
    # Label để phân biệt trong Grafana
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  - job_name: 'identity-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['identity-service:8762']

  - job_name: 'music-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['music-service:8764']

  - job_name: 'social-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['social-service:8767']

  - job_name: 'payment-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['payment-service:8765']

  - job_name: 'ads-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['ads-service:8768']

  - job_name: 'recommendation-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['recommendation-service:8769']

  - job_name: 'transcode-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['transcode-service:8766']

  - job_name: 'integration-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['integration-service:8763']

  # ─── Python ML service (FastAPI + prometheus_fastapi_instrumentator)
  - job_name: 'recommendation-ml'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['recommendation-ml:8771']