global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  # ─── Prometheus tự monitor ─────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ─── Node Exporter (host metrics) ─────────────────────────────
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # ─── cAdvisor (Docker container metrics) ───────────────────────
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # ─── Spring Boot services ──────────────────────────────────────
  # Prometheus và các services giờ cùng network tramcamxuc-net
  # → dùng container name để scrape

  - job_name: 'api-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['api-gateway:8080']

  - job_name: 'discovery-server'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['discovery-server:8761']

  - job_name: 'identity-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['identity-service:8762']

  - job_name: 'integration-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['integration-service:8763']

  - job_name: 'music-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['music-service:8764']

  - job_name: 'payment-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['payment-service:8765']

  - job_name: 'transcode-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['transcode-service:8766']

  - job_name: 'social-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['social-service:8767']

  - job_name: 'ads-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['ads-service:8768']

  - job_name: 'recommendation-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['recommendation-service:8769']

  # ─── Python ML service ─────────────────────────────────────────
  - job_name: 'recommendation-ml'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['recommendation-ml:8771']